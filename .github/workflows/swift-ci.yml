name: Swift CI

"on":
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: swift-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-swift:
    name: macOS 26 hosted SwiftPM

    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift toolchain
        run: |
          set -euo pipefail
          xcodebuild -version
          swift --version

      - name: Build package
        run: swift build

      - name: Validate DocC catalog
        run: |
          set -euo pipefail
          rm -rf .build/symbol-graphs .build/docc
          mkdir -p .build/symbol-graphs .build/docc
          swift build \
            -Xswiftc -emit-symbol-graph \
            -Xswiftc -emit-symbol-graph-dir \
            -Xswiftc .build/symbol-graphs
          xcrun docc convert Sources/WebTransport/WebTransport.docc \
            --additional-symbol-graph-dir .build/symbol-graphs \
            --output-dir .build/docc/WebTransport.doccarchive \
            --transform-for-static-hosting \
            --hosting-base-path WebTransport

      - name: Build public API compatibility sample
        run: ./check-api-compatibility.sh
        working-directory: Swift

      - name: Verify release artifacts
        run: ./build-release-apple-silicon.sh
        working-directory: Swift

      - name: Run package tests
        env:
          WEBTRANSPORT_REQUIRE_CLI_BINARIES: "1"
          WEBTRANSPORT_REQUIRE_RELEASE_ARTIFACTS: "1"
        run: swift test

      - name: Run client CLI conformance
        run: swift run WebTransportClient --scenario all

      - name: Run server CLI conformance
        run: swift run WebTransportServer --scenario all
